<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- displays site properly based on user's device -->

	<link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
	<link rel="stylesheet" href="style.css">

	<title>Frontend Mentor | Social links profile</title>

	<!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
	<style>
	</style>
</head>
<body>
<main>
	<div class="card">
		<div class="avatar-container">
			<img src="./assets/images/avatar-jessica.jpeg" alt="Social Media Avatar" width="176" height="176">
			<h1 class="text-preset-1">Jessica Randall</h1>
			<p class="location text-preset-2 bold">London, United Kingdom</p>
			<p class="quote text-preset-2">"Front-end developer and avid reader."</p>
		</div>
		<div class="link-container">
			<button type="button" class="text-preset-2 bold">GitHub</button>
			<button type="button" class="text-preset-2 bold">Frontend Mentor</button>
			<button type="button" class="text-preset-2 bold">LinkedIn</button>
			<button type="button" class="text-preset-2 bold">Twitter</button>
			<button type="button" class="text-preset-2 bold">Instagram</button>
		</div>
	</div>

</main>
<footer class="attribution">
	Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
	Coded by <a href="https://ryanwells.io">Ryan Wells</a>.
</footer>
</body>
</html>
