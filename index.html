<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- displays site properly based on user's device -->

	<link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
	<link rel="stylesheet" href="style.css">

	<title>Frontend Mentor | Social links profile</title>

</head>
<body>
<main>
	<div class="card">
		<div class="avatar-container">
			<img src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall portrait" width="88" height="88">
			<h1 class="text-preset-1">Jessica Randall</h1>

			<p class="quote text-preset-2">"Front-end developer and avid reader."</p>
		</div>
		<div class="link-container">
			<a href="#" rel="noopener noreferrer" aria-label="Visit Jessica Randall's GitHub" target="_blank">GitHub</a>
			<a href="#" rel="noopener noreferrer" aria-label="Visit Jessica Randall's Frontend Mentor" target="_blank">Frontend Mentor</a>
			<a href="#" rel="noopener noreferrer" aria-label="Visit Jessica Randall's LinkedIn" target="_blank">LinkedIn</a>
			<a href="#" rel="noopener noreferrer" aria-label="Visit Jessica Randall's Twitter" target="_blank">Twitter</a>
			<a href="#" rel="noopener noreferrer" aria-label="Visit Jessica Randall's Instagram" target="_blank">Instagram</a>
		</div>
	</div>

</main>
<footer class="attribution">
	Challenge by <a href="https://www.frontendmentor.io?ref=challenge" rel="noopener noreferrer">Frontend Mentor</a>.

</html>
